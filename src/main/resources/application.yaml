spring:
  application:
    name: svt-api
  datasource:
    url: jdbc:h2:mem:svt;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  environment: local

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

game:
  balance:
    starting-stats:
      cash: 8000
      customers: 5
      morale: 80
      coffee: 10
      bugs: 0
    starting-location-id: 1
    start-date-window-days: 365
    timezone: America/Los_Angeles
    economy:
      revenue-per-customer: 300
      operating-cost: 2000
      coffee-decay-per-turn: 1
    action-costs:
      travel:
        cash-cost: 300
        coffee-cost: 2
      rest:
        morale-gain: 15
        coffee-gain: 3
      work-on-product:
        morale-cost: 5
        coffee-cost: 2
        bugs-reduced: 3
      marketing:
        cash-cost: 2000
        customers-gained: 3
      pitch-vcs:
        morale-cost: 15
        coffee-cost: 3
        morale-gate: 60
        cash-gained: 3000
        customers-gained: 3
        linkedin-bonus-cash: 1500
      buy-supplies:
        cash-cost: 1500
        coffee-gained: 8
    crypto:
      min-invest: 500
      leverage-multiplier: 5
      fallback-delta-min: -0.30
      fallback-delta-max: 0.30
    thresholds:
      cash-bankrupt: -5000
      terminal-location-id: 10
