spring:
  application:
    name: svt-api
  datasource:
    url: jdbc:h2:mem:svt;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  environment: local

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

game:
  balance:
    starting-stats:
      cash: 8000
      customers: 5
      morale: 80
      coffee: 10
      bugs: 0
    starting-location-id: 1
    start-date-window-days: 365
    timezone: America/Los_Angeles
